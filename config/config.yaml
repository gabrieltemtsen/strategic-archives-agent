app:
  name: "Strategic Archives Agent"
  timezone: "Africa/Lagos"   # WAT = UTC+1

# Global defaults — inherited by every channel loaded from CHANNELS env var
defaults:
  video:
    resolution: "1920x1080"
    fps: 24
    min_duration: 300    # 5 min
    max_duration: 600    # 10 min
    transition: "fade"

  tts:
    provider: "gemini"
    speaking_rate: 0.85
    pitch: 0.0
    volume_gain_db: 1.5

  visuals:
    provider: "huggingface"
    model: "black-forest-labs/FLUX.1-schnell"
    images_per_video: 14
    negative_prompt: "blurry, low quality, watermark, text overlay, deformed"

  music:
    volume: 0.15
    fade_in: 3
    fade_out: 5

  youtube:
    privacy_status: "public"
    made_for_kids: false
    category_id: "22"

telegram:
  approval_timeout: 3600
