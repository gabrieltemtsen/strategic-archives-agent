app:
  name: "Strategic Archives Agent"
  channel: "@strategicarchivesHQ"
  timezone: "Africa/Lagos" # WAT = UTC+1
  upload_time: "18:00" # 6pm WAT daily

content:
  types:
    - bedtime_stories
    - fun_facts
  languages:
    primary: "en"
    supported:
      - "en" # English
      - "fr" # French
      - "yo" # Yoruba
      - "ha" # Hausa
      - "ig" # Igbo
      - "pt" # Portuguese
      - "es" # Spanish
  video:
    min_duration: 300 # 5 mins in seconds
    max_duration: 600 # 10 mins in seconds
    resolution: "1920x1080"
    fps: 24
    background_color: "0x1a1a2e"
    transition: "fade"

  bedtime_stories:
    word_count_min: 800
    word_count_max: 1200
    target_age: "3-8"
    tone: "warm, soothing, magical"
    themes:
      - animals
      - friendship
      - adventure
      - nature
      - magic
      - family

  fun_facts:
    facts_count_min: 10
    facts_count_max: 15
    target_age: "4-10"
    tone: "energetic, curious, fun"
    topics:
      - animals
      - space
      - science
      - history
      - nature
      - food
      - dinosaurs
      - ocean

youtube:
  category_id: "22" # People & Blogs (kids content)
  privacy_status: "public"
  made_for_kids: true
  default_language: "en"
  tags:
    - "kids"
    - "children"
    - "bedtime stories"
    - "fun facts for kids"
    - "educational"
    - "learning"
    - "animated stories"
    - "kids channel"

telegram:
  approval_timeout: 3600 # 1 hour to approve before auto-skip
  chat_id: "" # Set in .env

tts:
  provider: "gemini" # gemini | google | gtts
  speaking_rate: 0.85 # Slightly slower for kids
  pitch: 2.0 # Slightly higher pitch for kids
  volume_gain_db: 2.0

visuals:
  provider: "huggingface"
  model: "black-forest-labs/FLUX.1-schnell"
  style: "high quality digital illustration, Pixar-style 3D render, vibrant colors, soft lighting, children's animation, professional studio quality, detailed, 4K"
  negative_prompt: "scary, dark, violent, adult content, realistic, photographic"
  images_per_video: 15
  parallel_workers: 3

music:
  volume: 0.15 # Background music volume (0.0 - 1.0)
  fade_in: 3
  fade_out: 5
