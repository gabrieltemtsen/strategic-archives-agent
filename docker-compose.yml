version: "3.8"

services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./assets:/app/assets
      - ./.youtube_token.pkl:/app/.youtube_token.pkl
      - ./client_secret.json:/app/client_secret.json
    restart: unless-stopped
